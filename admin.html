<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <!-- Access protection -->
  <script>
    if (localStorage.getItem("admin") !== "true") {
      alert("Access Denied ❌");
      window.location = "login.html";
    }
  </script>
</head>

<body class="search">

<!-- NAVBAR -->
<div class="navbar">
  <h2>🩸 Blood Bank Admin</h2>
  <button onclick="logout()">Logout</button>
</div>

<!-- 👨‍⚕️ DOCTOR IMAGE SECTION -->
<div style="text-align:center; margin-top:25px;">
  <img src="doctor.png" alt="Doctor Image"
       style="width:150px; height:150px; border-radius:50%;
       object-fit:cover; box-shadow:0 6px 15px rgba(0,0,0,0.3);">

  <h3 style="margin-top:10px;">Welcome Admin</h3>
  <p style="color:gray;">Blood Bank Management Dashboard</p>
</div>

<!-- TABLE SECTION -->
<div class="form-container">
  <h2>Registered Donors</h2>
</div>

<table id="adminTable"></table>

<script src="script.js"></script>

<script>
window.onload = function () {
  loadDonors();
};
</script>

</body>
</html>
