<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body class="register">

<div class="form-container">

<h2>Hospital Admin Login</h2>

<!-- OPTIONAL MESSAGE -->
<p id="msg" style="text-align:center; color:red;"></p>

<input id="hospitalId" placeholder="Hospital ID">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script src="script.js"></script>

<script>
// ✅ ONLY redirect if user just logged out
if(localStorage.getItem("justLoggedOut") === "true"){

  // show message
  document.getElementById("msg").innerText = "Logged out successfully...";

  // remove flag so it doesn't trigger again
  localStorage.removeItem("justLoggedOut");

  // redirect after 1.5 seconds
  setTimeout(() => {
    window.location = "index.html";
  }, 1500);
}
</script>

</body>
</html>
